# =============================================================
# docker-compose.yml — Price Intelligence Platform
# Environnement de développement LOCAL (0€, sans GCP réel)
# =============================================================
# ┌──────────────────────────────────────────────────────────┐
# │  COUCHE APPLICATIVE (app-network)                        │
# │  nginx:80 → frontend:80 (Angular)                       │
# │           → backend:8000 (FastAPI) → postgres-app:5432   │
# │                                    → redis:6379          │
# ├──────────────────────────────────────────────────────────┤
# │  COUCHE DATA (price-intel-network)                       │
# │  airflow-webserver:8080  → postgres (Airflow):5433       │
# │  airflow-scheduler       → bigtable-emulator:8086        │
# │  nifi:8443               → bigtable-emulator:8086        │
# │  backend ←──── aussi connecté ici pour Bigtable ────→    │
# └──────────────────────────────────────────────────────────┘
# =============================================================

# --------------------------
# RÉSEAUX
# --------------------------
networks:
  # Réseau pour la couche data (Airflow, NiFi, Bigtable, Postgres Airflow)
  price-intel-network:
    driver: bridge
  # Réseau pour la couche applicative (Backend, Frontend, Nginx, Redis, Postgres App)
  app-network:
    driver: bridge

# --------------------------
# VOLUMES PERSISTANTS
# --------------------------
volumes:
  postgres_data: # Données PostgreSQL Airflow
  postgres_app_data: # Données PostgreSQL App (users, watchlist, alerts)
  redis_data: # Données Redis (sessions, cache)
  nifi_conf: # Configuration NiFi
  nifi_database_repo: # Dépôt interne NiFi
  nifi_flowfile_repo: # FlowFiles en transit NiFi
  nifi_content_repo: # Contenu des FlowFiles NiFi
  nifi_provenance_repo:
    # Traçabilité NiFi

    # --------------------------
    # BLOC COMMUN AIRFLOW (YAML Anchor)
    # --------------------------
x-airflow-common: &airflow-common
  build: .
  environment:

    # --- Moteur d'exécution ---
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    # --- Connexion à la base de données PostgreSQL ---
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow_secret}@postgres/${POSTGRES_DB:-airflow}

    # --- Configuration générale ---
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__WEBSERVER__SECRET_KEY: 'local-dev-secret-key'

    # --- API REST Airflow ---
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'

    # --- Variables d'environnement pour Bigtable ---
    BIGTABLE_EMULATOR_HOST: bigtable-emulator:8086
    GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-price-intel-local}
    BIGTABLE_INSTANCE_ID: ${BIGTABLE_INSTANCE_ID:-price-intel-instance}

    # GCP credentials for BigQuery (export + dbt)
    GOOGLE_APPLICATION_CREDENTIALS: "/opt/airflow/gcp-credentials.json"
    _PIP_ADDITIONAL_REQUIREMENTS: "webdriver-manager undetected-chromedriver selenium beautifulsoup4 requests"

  volumes:
    - ./logs:/opt/airflow/logs:Z
    - ./airflow/dags:/opt/airflow/dags:Z
    - ./plugins:/opt/airflow/plugins:Z
    - ./scrapers:/app:z
    - ./data-analysis:/opt/airflow/data-analysis:Z
    - ./gcp-credentials.json:/opt/airflow/gcp-credentials.json:ro,z
    - ./dbt:/usr/app/dbt:Z

  user: "${AIRFLOW_UID:-50000}:0"

  depends_on:
    postgres:
      condition: service_healthy
    bigtable-emulator:
      condition: service_started

  networks:
    - price-intel-network

# =============================================================
# DÉFINITION DES SERVICES
# =============================================================
services:

  # ═══════════════════════════════════════════════════════════
  #                    COUCHE DATA
  # ═══════════════════════════════════════════════════════════

  # -----------------------------------------------------------
  # 1. ÉMULATEUR GOOGLE CLOUD BIGTABLE
  # -----------------------------------------------------------
  bigtable-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    container_name: bigtable-emulator
    command: >
      bash -c "
        gcloud components install beta --quiet 2>/dev/null || true &&
        echo '✅ Bigtable Emulator démarré sur le port 8086...' &&
        gcloud beta emulators bigtable start --host-port=0.0.0.0:8086
      "
    ports:
      - "8086:8086"
    networks:
      - price-intel-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo '' > /dev/tcp/localhost/8086" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # -----------------------------------------------------------
  # 1.5 BIGTABLE INIT — Charge la data locale dans Bigtable
  # -----------------------------------------------------------
  bigtable-init:
    image: python:3.10-slim
    container_name: bigtable-init
    volumes:
      - ./scrapers:/app:z
    working_dir: /app
    environment:
      BIGTABLE_EMULATOR_HOST: bigtable-emulator:8086
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-price-intel-local}
      BIGTABLE_INSTANCE_ID: ${BIGTABLE_INSTANCE_ID:-price-intel-instance}
    command: >
      bash -c "
        echo '🚀 Installation des dependances...' &&
        pip install google-cloud-bigtable --quiet &&
        echo '🚀 Chargement des donnees dans Bigtable Emulator...' &&
        python load_all_to_bigtable.py &&
        echo '✅ Donnees chargees avec succes !'
      "
    networks:
      - price-intel-network
    restart: "no"
    depends_on:
      bigtable-emulator:
        condition: service_healthy

  # -----------------------------------------------------------
  # 2. POSTGRESQL AIRFLOW — Base de données metadata d'Airflow
  # Port hôte : 5433 (évite le conflit avec EnterpriseDB local)
  # -----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - price-intel-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}" ]
      interval: 5s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------
  # 3. AIRFLOW INIT — Tâche d'initialisation (run une seule fois)
  # -----------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: >
      bash -c "
        echo '🚀 Initialisation de la base de données Airflow...' &&
        airflow db migrate &&
        echo '👤 Création de l utilisateur admin...' &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@price-intel.local --password admin123 &&
        echo '✅ Airflow initialisé avec succès !'
      "
    restart: "no"

  # -----------------------------------------------------------
  # 4. AIRFLOW WEBSERVER — Interface graphique Airflow
  # Accès : http://localhost:8080 (admin / admin123)
  # -----------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    shm_size: 2gb
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # -----------------------------------------------------------
  # 5. AIRFLOW SCHEDULER — Le "cœur" d'Airflow
  # -----------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    shm_size: 2gb
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # -----------------------------------------------------------
  # 6. APACHE NIFI — Ingestion temps réel (streaming)
  # Accès : https://localhost:8443/nifi (admin / adminpassword123)
  # -----------------------------------------------------------
  nifi:
    build:
      context: ./nifi
      dockerfile: Dockerfile
    image: price-intelligence-nifi
    container_name: nifi
    environment:
      AUTH: single-user
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USERNAME:-admin}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD:-adminpassword123}
      BIGTABLE_EMULATOR_HOST: bigtable-emulator:8086
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-price-intel-local}
      BIGTABLE_INSTANCE_ID: ${BIGTABLE_INSTANCE_ID:-price-intel-instance}
    volumes:
      - ./scrapers:/app:z
      - ./nifi/templates:/opt/nifi/nifi-current/conf/templates:ro,z
      - nifi_conf:/opt/nifi/nifi-current/conf
      - nifi_database_repo:/opt/nifi/nifi-current/database_repository
      - nifi_flowfile_repo:/opt/nifi/nifi-current/flowfile_repository
      - nifi_content_repo:/opt/nifi/nifi-current/content_repository
      - nifi_provenance_repo:/opt/nifi/nifi-current/provenance_repository
    ports:
      - "8443:8443"
    networks:
      - price-intel-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-k", "--fail", "https://nifi:8443/nifi-api/system-diagnostics" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      bigtable-emulator:
        condition: service_started

  # -----------------------------------------------------------
  # 7. DBT — Transformation Layer (lancé manuellement)
  # -----------------------------------------------------------
  dbt:
    image: ghcr.io/dbt-labs/dbt-bigquery:1.8.2
    container_name: dbt
    volumes:
      - .:/usr/app/dbt:z
      - ./dbt/profiles.yml:/root/.dbt/profiles.yml:z
      - ./gcp-credentials.json:/opt/airflow/gcp-credentials.json:ro,z
    working_dir: /usr/app/dbt/dbt
    environment:
      GCP_PROJECT_ID: price-intelligence-495411
    profiles: [ "cli" ]

  # ═══════════════════════════════════════════════════════════
  #                 COUCHE APPLICATIVE
  # ═══════════════════════════════════════════════════════════

  # -----------------------------------------------------------
  # 8. POSTGRESQL APP — Base de données de l'application
  # Stocke : users, watchlist, sessions, alerts
  # Port hôte : 5432 (port standard)
  # -----------------------------------------------------------
  postgres-app:
    image: postgres:15-alpine
    container_name: postgres-app
    environment:
      POSTGRES_USER: ${APP_DB_USER:-app_user}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-app_secret}
      POSTGRES_DB: ${APP_DB_NAME:-price_intelligence}
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
      # Tout fichier .sql dans ce dossier est exécuté au 1er démarrage
      - ./backend/sql:/docker-entrypoint-initdb.d:z
    ports:
      - "5432:5432"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${APP_DB_USER:-app_user}" ]
      interval: 5s
      retries: 5
      start_period: 10s

  # -----------------------------------------------------------
  # 9. REDIS — Cache, sessions, WebSocket pub/sub
  # Port hôte : 6379
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 5
      start_period: 5s

  # -----------------------------------------------------------
  # 10. BACKEND — API FastAPI
  # Accès direct : http://localhost:8000 (dev uniquement)
  # En prod : accessible via nginx sur /api/*
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    # `env_file` loads every non-host-specific setting from backend/.env
    # (SECRET_KEY, ALGORITHM, GCP_PROJECT_ID, BIGQUERY_DATASET/TABLE,
    # INTERNAL_API_KEY, SMTP_*, EMAIL_*, FRONTEND_URL, …) so we have a
    # single source of truth for app config.  The `environment:` block
    # below then overrides ONLY the values that must be different inside
    # the Compose network (DB host, Redis host, credential path, etc.).
    #
    # `required: false` — Compose Specification long-form so the spec
    # still parses when backend/.env is absent (CI runners, fresh
    # clones).  Missing values fall back to Settings defaults or the
    # `environment:` block below.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # --- Base de données applicative (override host .env) ----------
      # `postgresql+psycopg2://` is SQLAlchemy syntax — raw psycopg2 (the
      # driver this service uses via ThreadedConnectionPool) rejects the
      # `+psycopg2` suffix.  Use the plain libpq URL.
      DATABASE_URL: postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD:-app_secret}@postgres-app:5432/${APP_DB_NAME:-price_intelligence}

      # --- Redis (override host .env which points at 127.0.0.1) ------
      REDIS_URL: redis://redis:6379/0

      # --- Bigtable / GCP (container hostnames, container cred path) -
      BIGTABLE_EMULATOR_HOST: bigtable-emulator:8086
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-price-intel-local}
      BIGTABLE_INSTANCE_ID: ${BIGTABLE_INSTANCE_ID:-price-intel-instance}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/gcp/gcp-credentials.json

      # --- NiFi (container hostname) ---------------------------------
      NIFI_URL: ${NIFI_URL:-http://nifi:8081/contentListener}

      # --- Frontend URL embedded in verification / password-reset
      # emails.  Browser-side, so it must resolve from outside Docker.
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}

      # --- Data Analyst dashboard exports --------------------------
      # Read by /api/analytics/*.  The default in config.py points at
      # the repo's data-analysis/outputs/app, which doesn't exist on
      # the container's path (backend is mounted at /app), so point it
      # at the read-only mount below.  Swap to a BigQuery mart later and
      # this can be dropped.
      ANALYTICS_DATA_DIR: /opt/analytics
    volumes:
      - ./backend:/app:z
      - ./gcp-credentials.json:/opt/gcp/gcp-credentials.json:ro,z
      - ./data-analysis/outputs/app:/opt/analytics:ro,z
    ports:
      - "8000:8000"
    networks:
      # Sur les DEUX réseaux : accès app + accès data (Bigtable)
      - app-network
      - price-intel-network
    restart: unless-stopped
    # Liveness probe only.  /health/ready also checks BigQuery which is
    # not reachable in pure-local dev — using it here would mark backend
    # unhealthy forever.  Mirrors the Dockerfile HEALTHCHECK so the
    # behaviour is identical whether the image is run by compose or by
    # `docker run` directly.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health/live', timeout=5); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres-app:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -----------------------------------------------------------
  # 11. FRONTEND — Angular SPA (via nginx interne)
  # Accès direct : http://localhost:4200 (dev uniquement)
  # En prod : accessible via nginx reverse proxy sur /
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "4200:80"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -----------------------------------------------------------
  # 12. NGINX — Reverse Proxy (Point d'entrée unique)
  # Accès : http://localhost (port 80)
  #   /api/*  → backend:8000
  #   /ws/*   → backend:8000 (WebSocket)
  #   /*      → frontend:80  (Angular SPA)
  # -----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - backend
      - frontend
