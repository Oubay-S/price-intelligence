# ──────────────────────────────────────────────
# nginx.conf — Reverse Proxy (Price Intelligence)
# Point d'entrée unique sur le port 80
# ──────────────────────────────────────────────
# Routes :
#   /api/*  → backend FastAPI  (port 8000)
#   /ws/*   → backend WebSocket (port 8000, avec Upgrade headers)
#   /*      → frontend Angular  (port 80)
# ──────────────────────────────────────────────

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    # Taille max des requêtes (uploads, etc.)
    client_max_body_size 50M;

    # ─── API REST ───
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts pour les requêtes longues (scraping triggers, etc.)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ─── WebSocket ───
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Headers CRITIQUES pour WebSocket
        # Sans ces headers, la connexion WebSocket reçoit une erreur 400
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout WebSocket (1h — les connexions persistent longtemps)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── Frontend Angular (SPA) ───
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
