version: 2

models:
  - name: mart_price_trends
    description: "Analytics-ready product price trend table by store, category, and day."
    columns:
      - name: product_id
        tests:
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: store_name
        tests:
          - not_null
          - accepted_values:
              values: ['JUMIA', 'EBAY', 'WALMART']
      - name: category_name
        tests:
          - not_null
      - name: price_date
        tests:
          - not_null
      - name: latest_price
        tests:
          - not_null
      - name: price_trend_direction
        tests:
          - not_null
          - accepted_values:
              values: ['new', 'increased', 'decreased', 'unchanged']
