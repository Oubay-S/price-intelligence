# Configuration nginx interne au conteneur frontend Angular
# Gère le routing SPA (toutes les routes → index.html)
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Angular SPA routing — toute URL non trouvée → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache statique (JS, CSS, images) — 1 an car hashé par Angular
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
