# Configuration nginx interne au conteneur frontend Angular
# Gère le routing SPA (toutes les routes → index.html)
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.csr.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # API + WebSocket → backend container. Lets http://localhost:4200 work as a
    # standalone entry point (data + live feed) without depending on the
    # separate reverse-proxy nginx or host port 80 (which XAMPP/Apache may hold).
    # Variable proxy_pass + Docker's embedded resolver = nginx won't crash at
    # startup if backend isn't up yet.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream backend:8000;
        proxy_pass http://$api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location /ws/ {
        resolver 127.0.0.11 valid=10s;
        set $ws_upstream backend:8000;
        proxy_pass http://$ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Angular routing — server output mode emits index.csr.html (client-side
    # render shell), not index.html. Any unmatched URL falls back to it.
    location / {
        try_files $uri $uri/ /index.csr.html;
    }

    # Cache statique (JS, CSS, images) — 1 an car hashé par Angular
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
